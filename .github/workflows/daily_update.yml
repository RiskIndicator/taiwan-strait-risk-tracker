name: Daily Risk Tracker
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      post_tweet:
        description: 'Post to Twitter?'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    outputs:
      tweet_output: ${{ steps.build.outputs.tweet }}
      image_output: ${{ steps.build.outputs.image_url }}
      risk_score: ${{ steps.build.outputs.risk_score }}
      top_headline: ${{ steps.build.outputs.top_headline }}
    steps:
      - uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Build Scripts
        id: build
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python build.py
          python build_ai.py
          python build_k_shape.py
          python build_supply.py
          python build_fiat.py
          python build_macro.py
          python build_middle_east.py
          python build_fuel.py
          python build_sitemap.py

        
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Daily Update"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit."
          fi

  post-to-twitter:
    runs-on: ubuntu-latest
    needs: update-data  
    if: github.event_name == 'schedule' || inputs.post_tweet == true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
      
      - name: Install Dependencies
        run: pip install tweepy pytz google-genai

      - name: Run Tweet Script
        env:
          TWITTER_API_KEY: "${{ secrets.TWITTER_API_KEY }}"
          TWITTER_API_SECRET: "${{ secrets.TWITTER_API_SECRET }}"
          TWITTER_ACCESS_TOKEN: "${{ secrets.TWITTER_ACCESS_TOKEN }}"
          TWITTER_ACCESS_SECRET: "${{ secrets.TWITTER_ACCESS_SECRET }}"
          GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
          RISK_SCORE: "${{ needs.update-data.outputs.risk_score }}"
          TOP_HEADLINE: "${{ needs.update-data.outputs.top_headline }}"
        run: python send_tweet.py